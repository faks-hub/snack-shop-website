<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Faks" />
    <meta name="description" content="Gifty Yummy Snacks website" />
    <title>Gifty Yummy Snacks</title>
    <link rel="icon" href="icon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="main.css" type="text/css" />
    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
      (function () {
        emailjs.init({
          publicKey: "rSAoGSvE9Iuvt9HNy",
        });
      })();
    </script>
    <script src="js/main.js" defer></script>
  </head>

  <body>
    <header class="header">
      <h1 class="header__h1">Gifty Yummy Snacks</h1>
      <nav class="header__nav">
        <ul class="header__ul">
          <li><a href="/">Home</a></li>
          <li><a href="/#menu">Menu</a></li>
          <li><a href="hours.html">Hours</a></li>
          <li><a href="about.html">About</a></li>
        </ul>
      </nav>
    </header>

    <section class="hero__puf">
      <figure>
        <img
          src="img/Puff Puff, Small Chops & Fish roll.jpeg"
          alt="Puff Puff, Small Chops & Fish roll"
          width="500"
          height="400" />
        <img
          src="img/Puff Puff,2.jpeg"
          alt="Puff Puff, Small Chops & Fish roll"
          width="500"
          height="400" />
        <figcaption class="offscreen">
          Small Chops Puff Puff & Fish roll
        </figcaption>
      </figure>
    </section>

    <main class="main">
      <article class="main__article">
        <h2>Our Location</h2>
        <address>
          <p>
            123 Street <br />
            UK, 94103
          </p>
          <br />
          <a
            href="https://wa.me/447944100575?text=Hello%20I%20want%20to%20order%20snacks"
            target="_blank">
            Chat with us on WhatsApp
          </a>
          <p>Phone: <a href="tel:447944100575"> +44 (7944) 100575</a></p>
        </address>
      </article>
      <hr />
      <article class="main__article contact">
        <h2 class="contact__h2">Our Contact Form</h2>

        <form class="contact__form">
          <fieldset class="contact__fieldset">
            <legend class="offscreen">Send Us A Message</legend>
            <p class="contact__p">
              <label class="contact__label" for="name">Name:</label>
              <input
                class="contact__input"
                type="text"
                name="name"
                id="name"
                placeholder="your name"
                required />
            </p>
            <p class="contact__p">
              <label class="contact__label" for="email">Email:</label>
              <input
                class="contact__input"
                type="email"
                name="email"
                id="email"
                placeholder="your email"
                required />
            </p>
            <p class="contact__p">
              <label class="contact__label" for="message">Your Message:</label>

              <textarea
                class="contact__textarea"
                name="message"
                id="message"
                cols="1"
                rows="3"
                placeholder="Type your message here"></textarea>
            </p>
          </fieldset>
          <button class="contact__button" type="submit" onclick="sendMail()">
            Send
          </button>
          <button class="contact__button" type="reset">Reset</button>
        </form>
      </article>
    </main>
    <footer class="footer">
      <p>
        <span class="nowrap">&copy; <time id="year"></time></span>
        <span class="nowrap"> Gummy Yummy Snacks</span>
      </p>
    </footer>
  </body>
</html>
